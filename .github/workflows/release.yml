name: release

on:
  push:
    branches:
      - main

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  actionlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: rhysd/actionlint@v1

  validate:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        eslint-version: ['^8.0.0', '^9.0.0', '^10.0.0']
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm install --no-save eslint@${{ matrix.eslint-version }}
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test -- --run
      - run: npm run build
      - run: npm run lockfile:check

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run test:coverage

  consumer-smoke:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - eslint-version: '^8.0.0'
            consumer-config: legacy
          - eslint-version: '^9.0.0'
            consumer-config: flat
          - eslint-version: '^10.0.0'
            consumer-config: flat
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm install --no-save eslint@${{ matrix.eslint-version }}
      - name: Smoke test packed consumer install
        env:
          CONSUMER_CONFIG: ${{ matrix.consumer-config }}
        run: npm run consumer:smoke

  package-smoke:
    runs-on: ubuntu-latest
    permissions:
      attestations: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm run pack:smoke
      - run: mkdir -p artifacts
      - run: npm pack --pack-destination artifacts
      - uses: actions/attest-build-provenance@v2
        with:
          subject-path: artifacts/*.tgz

  audit:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm audit --audit-level=high

  release-dry-run:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: semantic-release dry run
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
        run: npm run release:dry-run

  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    needs: [actionlint, validate, coverage, consumer-smoke, package-smoke, release-dry-run]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
        run: npx semantic-release
