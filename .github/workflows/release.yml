name: release

on:
  release:
    types:
      - published

concurrency:
  group: release-${{ github.event.release.tag_name || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

jobs:
  actionlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name }}
      - uses: rhysd/actionlint@v1.7.12

  validate:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        eslint-version: ['^8.0.0', '^9.0.0', '^10.0.0']
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name }}
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci --include=dev
      - run: npm install --no-save eslint@${{ matrix.eslint-version }}
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test -- --run
      - run: npm run build
      - run: npm run lockfile:check

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name }}
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci --include=dev
      - run: npm run test:coverage

  consumer-smoke:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - eslint-version: '^8.0.0'
            consumer-config: legacy
          - eslint-version: '^9.0.0'
            consumer-config: flat
          - eslint-version: '^10.0.0'
            consumer-config: flat
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name }}
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci --include=dev
      - run: npm install --no-save eslint@${{ matrix.eslint-version }}
      - name: Smoke test packed consumer install
        env:
          CONSUMER_CONFIG: ${{ matrix.consumer-config }}
        run: npm run consumer:smoke

  package-smoke:
    runs-on: ubuntu-latest
    permissions:
      attestations: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name }}
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci --include=dev
      - run: npm run build
      - run: npm run pack:smoke
      - run: mkdir -p artifacts
      - run: npm pack --pack-destination artifacts
      - uses: actions/attest-build-provenance@v2
        with:
          subject-path: artifacts/*.tgz

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name }}
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci --include=dev
      - run: npm audit --audit-level=high
        continue-on-error: true

  publish:
    runs-on: ubuntu-latest
    if: ${{ !github.event.release.prerelease }}
    needs: [actionlint, validate, coverage, consumer-smoke, package-smoke]
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name }}
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          registry-url: https://registry.npmjs.org
      - run: npm ci --include=dev
      - name: Publish stable package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
        run: npm publish --access public
