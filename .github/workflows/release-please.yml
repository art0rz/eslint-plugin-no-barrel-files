name: release please

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Determine release override
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          labels="$(gh pr list --base main --state open --json headRefName,labels --jq '[.[] | select(.headRefName | startswith("release-please--branches--")) | .labels[].name] | unique | join(",")')"
          override=''
          release_as=''
          if printf '%s' ",${labels}," | grep -q ',release:major,'; then
            override='release:major'
            current_version="$(node -p "require('./.release-please-manifest.json')['.']")"
            release_as="$(node -p "const [major] = '${current_version}'.split('.'); String(Number(major) + 1) + '.0.0'")"
          fi
          echo "release_override=${override}" >> "$GITHUB_OUTPUT"
          echo "release_as=${release_as}" >> "$GITHUB_OUTPUT"
        id: override
      - uses: googleapis/release-please-action@v4
        with:
          config-file: .github/release-please-config.json
          manifest-file: .release-please-manifest.json
          release-as: ${{ steps.override.outputs.release_as }}
